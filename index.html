<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physique Log - CSV Import</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .accent-color { color: #00e5ff; }
        .card { background-color: #1e1e1e; border-bottom: 1px solid #333; margin-bottom: 8px; padding: 12px; }
    </style>
</head>
<body>

    <header class="bg-[#1e1e1e] p-4 text-center shadow-md">
        <h1 class="text-xl font-bold accent-color">FitNotes Importer</h1>
    </header>

    <main class="p-4">
        <section class="mb-8 p-6 border-2 border-dashed border-gray-600 rounded-xl text-center bg-[#1a1a1a]">
            <p class="mb-4 text-sm text-gray-400">FitNotesからエクスポートしたCSVを選択してください</p>
            <input type="file" id="csvFile" accept=".csv" class="hidden">
            <label for="csvFile" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full cursor-pointer font-bold">
                CSVファイルを選択
            </label>
            <div id="status" class="mt-4 text-xs text-green-400"></div>
        </section>

        <div id="logDisplay">
            <h2 class="text-lg font-bold mb-4">最新のトレーニング履歴</h2>
            <div id="logs">
                <p class="text-gray-600 text-sm">CSVを読み込むとここに履歴が表示されます</p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const text = event.target.result;
                processData(text);
            };
            
            reader.readAsText(file);
        });

        function processData(csvText) {
            const lines = csvText.split('\n');
            const logsContainer = document.getElementById('logs');
            logsContainer.innerHTML = ''; // クリア
            
            // 簡易的な解析（1行目はヘッダーと想定）
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 5) continue;

                const [date, exercise, category, weight, reps] = cols;
                
                const card = document.createElement('div');
                card.className = 'card rounded-lg';
                card.innerHTML = `
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                        <span>\${date}</span>
                        <span class="bg-gray-800 px-2 rounded">\${category}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-bold">\${exercise}</span>
                        <span class="accent-color font-bold">\${weight}kg × \${reps}回</span>
                    </div>
                `;
                logsContainer.appendChild(card);
                
                // ここで本来はブラウザの保存領域（LocalStorage）にデータを格納します
            }
            
            document.getElementById('status').innerText = (lines.length - 1) + ' 件のデータを読み込みました！';
        }
    </script>
</body>
</html>
